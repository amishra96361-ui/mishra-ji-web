name: Publish GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'Deploy site to GitHub Pages'

      - name: Enable GitHub Pages site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          response=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')
          echo "Pages API status: $response"
          cat /tmp/pages.json
          if [ "$response" -ge 400 ]; then
            echo "Failed to enable GitHub Pages, please check repository permissions." >&2
            exit 1
          fi
